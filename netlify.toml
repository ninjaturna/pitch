[build]
publish = "dist/hpi"
command = "npm run build:hpi"

[build.environment]
NODE_VERSION = "20"

[[redirects]]
from = "/share"
to = "/share.html"
status = 200
force = true

[[redirects]]
from = "/hpi-deck.pdf"
to = "/hpi-deck.pdf"
status = 200

[[redirects]]
from = "/.well-known/*"
to = "/.well-known/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
